<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOWKETING | Agency</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-pink: #ff00ff;
            --accent-blue: #00ffff;
            --text-white: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        linear-gradient(90deg, rgba(255,0,255,0.2), rgba(0,255,255,0.2));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navbar */
        nav { width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 20px; letter-spacing: 2px; }
        .menu { display: flex; gap: 20px; font-size: 12px; text-transform: uppercase; }
        .btn-kick { border: 1px solid white; padding: 5px 15px; border-radius: 20px; font-size: 12px; }

        /* Hero */
        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: 80px; text-transform: uppercase; margin-bottom: 10px; color: white; text-shadow: 0 0 20px var(--accent-pink); }
        .hero p { color: var(--text-white); margin-bottom: 40px; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .main-btn { padding: 12px 30px; border: 1px solid white; border-radius: 30px; color: white; text-decoration: none; font-size: 14px; text-transform: uppercase; transition: 0.3s; width: 300px; text-align: center;}
        .main-btn:hover { background: white; color: black; }
        
        .stay-connected { font-size: 12px; margin-top: 20px; text-transform: uppercase; color: #888; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BLOWKETING</div>
        <div class="menu">
            <span>Models</span>
            <span>Telegram</span>
            <span>Manyvids</span>
            <span>Book</span>
            <span>Merch</span>
            <span>Contact</span>
        </div>
        <div class="btn-kick">KICK</div>
    </nav>

    <main class="hero">
        <p>Premium Creator • Est. 2024</p>
        <h1>BLOWKETING</h1>
        <p>We turn beauty into attention.<br>Attention into subscriptions.</p>

        <div class="btn-group">
            <a href="#" class="main-btn">Explore Models →</a>
            <a href="#" class="main-btn">Follow on X →</a>
            <a href="#" class="main-btn">New Releases • Telegram →</a>
            <div class="stay-connected">Stay connected<br>Behind the scenes, updates & more.</div>
            <a href="#" class="main-btn">Join on Instagram →</a>
        </div>
    </main>

</body>
</html>
