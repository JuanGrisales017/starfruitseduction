<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f3ff;
            --neon-gold: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            background: radial-gradient(circle at center, #1a0a1a 0%, #050505 100%);
            color: white; 
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Navbar estilo image.png con toque Neón */
        nav { 
            width: 100%; 
            padding: 20px 5%; 
            display: flex; 
            align-items: center; 
            background: rgba(0,0,0,0.9); 
            border-bottom: 1px solid var(--neon-pink);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .logo-text { font-size: 24px; letter-spacing: 4px; color: white; text-transform: uppercase; font-weight: bold; margin-right: auto; text-shadow: 0 0 10px var(--neon-pink); }
        
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        
        /* Botón Contáctanos Neón */
        .btn-contact { border: 1px solid var(--neon-blue); padding: 8px 20px; border-radius: 50px; color: var(--neon-blue) !important; transition: 0.3s; }
        .btn-contact:hover { background: var(--neon-blue); color: black !important; box-shadow: 0 0 15px var(--neon-blue); }

        /* Botones principales redondeados y neón */
        .btn {
            padding: 18px 40px;
            background: transparent;
            color: white;
            border: 2px solid var(--neon-pink);
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            text-decoration: none;
            display: block;
            text-align: center;
            box-shadow: 0 0 10px rgba(255,0,255,0.2);
        }
        .btn:hover { background: var(--neon-pink); box-shadow: 0 0 25px var(--neon-pink); transform: scale(1.05); }

        section { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; text-align: center; }
        h1 { font-size: 70px; text-transform: uppercase; background: linear-gradient(to right, var(--neon-pink), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        .btn-stack { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 350px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">STARFRUIT SEDUCTION</div>
        <div class="nav-links">
            <a href="#inicio">Inicio</a>
            <a href="#modelos">Nuestras Modelos</a>
            <a href="#servicios">Servicios</a>
            <a href="mailto:starfruitseduction@starfruitseduction.com" class="btn-contact">CONTÁCTANOS 💬</a>
        </div>
    </nav>

    <section id="inicio">
        <h1>Starfruit Seduction</h1>
        <div class="btn-stack">
            <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
            <a href="https://www.instagram.com/starfruitseduction/?__pwa=1" class="btn">Instagram</a>
            <a href="https://x.com/" class="btn">X</a>
        </div>
    </section>

    <div style="text-align: center; padding: 20px; color: #666; font-size: 12px; letter-spacing: 2px;">PREMIUM CREATOR • EST. 2026</div>

</body>
</html>
