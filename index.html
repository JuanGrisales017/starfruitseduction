<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #cca464; --wine-red: #8c1414; --gray-text: #9e9e9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: #000; color: white; font-family: 'Cinzel', serif; overflow-x: hidden; }

        /* --- ANIMACIONES --- */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .hero-content > * { animation: fadeInUp 1s ease-out forwards; opacity: 0; }
        .hero-label { animation-delay: 0.2s; }
        .hero-title { animation-delay: 0.4s; }
        .hero-desc { animation-delay: 0.6s; }
        .animate-btn { animation-delay: 0.8s; }

        /* --- NAV --- */
        nav { 
            width: 100%; padding: 20px 5%; display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; z-index: 1000;
        }

        .brand-container { display: flex; flex-direction: column; align-items: center; width: 180px; }
        .title-main { font-size: 1.5rem; color: var(--gold); letter-spacing: 6px; }
        .subtitle-row { display: flex; align-items: center; justify-content: center; width: 100%; }
        .line { width: 30px; height: 1px; background: var(--gold); margin: 0 5px; }
        .title-sub { font-size: 0.6rem; color: var(--wine-red); letter-spacing: 4px; text-transform: uppercase; }
        .title-badge { font-family: 'Montserrat', sans-serif; font-size: 0.45rem; color: var(--gray-text); letter-spacing: 7px; text-transform: uppercase; }
        .btn-contact { border: 1px solid var(--gold); padding: 8px 18px; border-radius: 50px; color: var(--gold); text-decoration: none; font-size: 9px; text-transform: uppercase; }

        /* --- SECCIÓN INICIO CON TU IMAGEN --- */
        #inicio {
            min-height: 100vh; width: 100%;
            /* AQUÍ ESTÁ TU IMAGEN */
            background: url('eec90190-ae0e-4283-92a2-bc521b5644cf.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 5%;
        }

        .hero-content { max-width: 700px; }
        .hero-label { color: var(--gold); font-size: 1rem; letter-spacing: 5px; margin-bottom: 25px; display: block; font-family: 'Montserrat', sans-serif; }
        .hero-title { 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            color: #fff; 
            line-height: 1; 
            margin-bottom: 30px; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        .hero-desc { color: var(--gray-text); font-family: 'Montserrat', sans-serif; margin-bottom: 40px; line-height: 1.6; font-size: 1.1rem; }
        
        /* Botones con efecto de escala */
        .btn-hero {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; max-width: 280px; padding: 18px; border: 1px solid var(--gold);
            color: white; text-decoration: none; margin-bottom: 20px;
            border-radius: 50px; font-size: 1rem; letter-spacing: 3px; 
            text-transform: uppercase; font-family: 'Montserrat', sans-serif;
            transition: transform 0.3s ease, background 0.4s, color 0.4s;
        }
        .btn-hero:hover { transform: scale(1.05); background: var(--gold); color: black; }

        /* Ajustes para celular */
        @media (max-width: 600px) {
            .hero-title { font-size: 3rem; }
            #inicio { align-items: center; text-align: center; }
            .hero-content { align-items: center; display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand-container">
            <h1 class="title-main">STARFRUIT</h1>
            <div class="subtitle-row">
                <span class="line"></span>
                <h2 class="title-sub">SEDUCTION</h2>
                <span class="line"></span>
            </div>
            <h3 class="title-badge">AGENCY</h3>
        </div>
        <a href="mailto:tuemail@spaceemail.com" class="btn-contact">CONTACTO</a>
    </nav>

    <section id="inicio">
        <div class="hero-content">
            <span class="hero-label">— AGENCIA DE MODELOS OFM —</span>
            <h1 class="hero-title">STARFRUIT <span style="color: var(--wine-red);">SEDUCTION</span></h1>
            <p class="hero-desc">Descubre un mundo de elegancia, exclusividad y profesionalismo con la agencia de modelos élite.</p>
            
            <a href="https://t.me/starfruitseduction" class="btn-hero animate-btn">
                <i class="fab fa-telegram"></i> TELEGRAM
            </a>
            <a href="https://www.instagram.com/starfruitseduction/" class="btn-hero animate-btn">
                <i class="fab fa-instagram"></i> INSTAGRAM
            </a>
            <a href="https://x.com/tuusuario" class="btn-hero animate-btn">
                <i class="fab fa-x-twitter"></i> X
            </a>
        </div>
    </section>

</body>
</html>
