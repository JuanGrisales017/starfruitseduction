<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #cca464; --wine-red: #8c1414; --gray-text: #9e9e9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: #000; color: white; font-family: 'Cinzel', serif; overflow-x: hidden; }

        /* --- ANIMACIONES GLOBALES --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-content > * {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
        }

        .hero-label { animation-delay: 0.2s; }
        .hero-title { animation-delay: 0.4s; }
        .hero-desc { animation-delay: 0.6s; }
        .animate-btn:nth-child(4) { animation-delay: 0.8s; }
        .animate-btn:nth-child(5) { animation-delay: 1.0s; }
        .animate-btn:nth-child(6) { animation-delay: 1.2s; }

        /* --- NAV TRANSPARENTE --- */
        nav { 
            width: 100%; padding: 20px 5%; display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; z-index: 1000;
        }

        .brand-container { display: flex; flex-direction: column; align-items: center; width: 180px; }
        .title-main { font-size: 1.5rem; color: var(--gold); letter-spacing: 6px; }
        .btn-contact {
            border: 1px solid var(--gold); padding: 8px 18px; border-radius: 50px;
            color: var(--gold); text-decoration: none; font-size: 9px; text-transform: uppercase;
            transition: 0.4s;
        }
        .btn-contact:hover { background: var(--gold); color: black; }

        /* --- SECCIÓN INICIO --- */
        #inicio {
            min-height: 100vh; width: 100%;
            background: url('59440.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; flex-direction: column; justify-content: center;
            padding-left: 5%;
        }

        .hero-title { font-size: 5rem; color: #fff; margin-bottom: 30px; }
        
        /* --- ESTILO BOTONES CON ZOOM (TRANSITION) --- */
        .btn-hero {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 280px; padding: 18px; border: 1px solid var(--gold);
            color: white; text-decoration: none; margin-bottom: 20px;
            border-radius: 50px; font-size: 1rem; letter-spacing: 3px; 
            text-transform: uppercase; font-family: 'Montserrat', sans-serif;
            /* La clave está aquí: transición suave de transformación */
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .btn-hero:hover { 
            /* Esto hace que crezca un 5% al pasar el cursor */
            transform: scale(1.05); 
            background: var(--gold); 
            color: black; 
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand-container">
            <h1 class="title-main">STARFRUIT</h1>
        </div>
        <a href="mailto:tuemail@spaceemail.com" class="btn-contact">CONTACTO</a>
    </nav>

    <section id="inicio">
        <div class="hero-content">
            <h1 class="hero-title">STARFRUIT <span style="color: var(--wine-red);">SEDUCTION</span></h1>
            
            <a href="https://t.me/starfruitseduction" class="btn-hero animate-btn">
                <i class="fab fa-telegram"></i> TELEGRAM
            </a>
            <a href="https://www.instagram.com/starfruitseduction/" class="btn-hero animate-btn">
                <i class="fab fa-instagram"></i> INSTAGRAM
            </a>
            <a href="https://x.com/tuusuario" class="btn-hero animate-btn">
                <i class="fab fa-x-twitter"></i> X
            </a>
        </div>
    </section>

</body>
</html>
