<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            padding: 20px;
        }

        /* Contenedor principal que agrupa todo en el centro */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 320px;
        }

        /* --- LOGO (Nombre de la agencia) --- */
        .logo-text-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px; /* Espacio entre el logo y los botones */
        }

        .title-starfruit { font-size: 1.8rem; font-weight: 500; color: #cca464; letter-spacing: 4px; margin-bottom: 6px; }
        
        .row-with-lines { display: flex; align-items: center; justify-content: center; width: 100%; margin: 3px 0; }
        .line-left, .line-right { width: 25px; height: 1px; background: rgba(204,164,100,0.5); }
        .line-left { margin-right: 10px; }
        .line-right { margin-left: 10px; }

        .text-seduction { font-size: 0.7rem; font-weight: 600; color: #8a1212; letter-spacing: 3px; }
        .text-agency { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 400; color: #b3b3b3; letter-spacing: 5px; }

        /* --- BOTONES --- */
        .interaction-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn { 
            width: 100%;
            border: 1px solid #cca464; padding: 12px 0; border-radius: 50px; 
            color: #cca464; text-decoration: none; font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase; text-align: center;
            transition: 0.4s;
        }
        
        .btn:hover { background: #cca464; color: black; box-shadow: 0 0 15px #cca464; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- Bloque del Nombre de la Agencia -->
        <div class="logo-text-container">
            <h1 class="title-starfruit">STARFRUIT</h1>
            <div class="row-with-lines">
                <span class="line-left"></span>
                <span class="text-seduction">SEDUCTION</span>
                <span class="line-right"></span>
            </div>
            <div class="row-with-lines">
                <span class="line-left"></span>
                <span class="text-agency">AGENCY</span>
                <span class="line-right"></span>
            </div>
        </div>

        <!-- Botones debajo del nombre -->
        <div class="interaction-container">
            <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
            <a href="https://www.instagram.com/starfruitseduction/" class="btn">Instagram</a>
            <a href="https://x.com/" class="btn">X</a>
        </div>
    </div>

</body>
</html>
