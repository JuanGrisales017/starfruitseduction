<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-gold: #c5a059;
            --text-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-white); 
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a0a1a 0%, #050505 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navbar Interactiva */
        nav { width: 100%; padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 22px; letter-spacing: 3px; color: var(--accent-gold); }
        .menu { display: flex; gap: 25px; font-size: 12px; text-transform: uppercase; }
        .menu a { color: #888; text-decoration: none; transition: 0.3s; }
        .menu a:hover { color: var(--accent-gold); }

        /* Hero */
        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero p.meta { color: var(--accent-gold); margin-bottom: 15px; letter-spacing: 3px; font-size: 12px; }
        .hero h1 { font-size: 70px; text-transform: uppercase; margin-bottom: 15px; color: white; letter-spacing: 2px; }
        .hero p.tagline { color: #ccc; margin-bottom: 50px; font-size: 18px; font-style: italic; }

        /* Grid de Botones */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; }
        .main-btn { padding: 15px 30px; border: 1px solid #333; border-radius: 8px; color: white; text-decoration: none; font-size: 14px; text-transform: uppercase; transition: 0.3s; text-align: center; }
        .main-btn:hover { border-color: var(--accent-gold); background: rgba(197, 160, 89, 0.1); }
        
        .full-width { grid-column: span 2; border-color: var(--accent-gold); background: rgba(197, 160, 89, 0.15); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">STARFRUIT SEDUCTION</div>
        <div class="menu">
            <a href="#">Models</a>
            <a href="#">Telegram</a>
            <a href="#">Contacto</a>
        </div>
    </nav>

    <main class="hero">
        <p class="meta">PREMIUM CREATOR • EST. 2026</p>
        <h1>STARFRUIT SEDUCTION</h1>
        <p class="tagline">Elevando la exclusividad y la estrategia<br>a un nivel de perfección inigualable.</p>

        <div class="btn-grid">
            <a href="#" class="main-btn">Explore Models</a>
            <a href="#" class="main-btn">Telegram</a>
            <a href="#" class="main-btn">Instagram</a>
            <a href="#" class="main-btn">Email Contact</a>
            <a href="#" class="main-btn full-width">View Full Portfolio →</a>
        </div>
    </main>

</body>
</html>
