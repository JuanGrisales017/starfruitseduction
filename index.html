<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #cca464; --wine-red: #8c1414; --gray-text: #9e9e9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: radial-gradient(circle at center, #1a0a1a 0%, #000 100%); color: white; font-family: 'Cinzel', serif; overflow-x: hidden; }

        /* --- NAV AJUSTADO --- */
        nav { 
            width: 100%; padding: 30px 5%; display: flex; align-items: center; justify-content: space-between;
            background: #000; border-bottom: 1px solid #222;
        }

        .brand-container { display: flex; flex-direction: column; align-items: center; }
        .title-main { font-size: 1.8rem; color: var(--gold); letter-spacing: 6px; line-height: 1; }
        .subtitle-row { display: flex; align-items: center; width: 100%; margin: 4px 0; }
        .line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(204,164,100,0), rgba(204,164,100,0.45), rgba(204,164,100,0)); }
        .title-sub { font-size: 0.7rem; color: var(--wine-red); padding: 0 8px; letter-spacing: 4px; text-transform: uppercase; }
        .title-badge { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; color: var(--gray-text); letter-spacing: 7px; text-transform: uppercase; margin-top: 2px; }

        /* Centro absoluto para INICIO y SERVICIOS */
        .nav-center { display: flex; gap: 25px; }
        .nav-center a { color: #fff; text-decoration: none; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; }
        .nav-center a:hover { color: var(--gold); }
        
        /* Botón CONTACTO derecha */
        .btn-contact {
            border: 1px solid var(--gold); padding: 8px 20px; border-radius: 50px;
            color: var(--gold); text-decoration: none; font-size: 10px; text-transform: uppercase;
            transition: 0.4s;
        }
        .btn-contact:hover { background: var(--gold); color: black; }

        /* Botones principales */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .btn {
            padding: 15px 30px; background: transparent; color: white; border: 1px solid var(--gold);
            border-radius: 50px; text-transform: uppercase; font-weight: bold; cursor: pointer;
            transition: 0.4s; text-decoration: none; display: block; text-align: center;
        }
        .btn:hover { background: var(--gold); color: black; animation: bounce 0.6s ease infinite; }
        .btn-stack { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 300px; margin-top: 40px; }
        
        section { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="brand-container">
            <h1 class="title-main">STARFRUIT</h1>
            <div class="subtitle-row">
                <span class="line"></span>
                <h2 class="title-sub">SEDUCTION</h2>
                <span class="line"></span>
            </div>
            <h3 class="title-badge">AGENCY</h3>
        </div>
        
        <div class="nav-center">
            <a href="#inicio">INICIO</a>
            <a href="#servicios">SERVICIOS</a>
        </div>

        <a href="mailto:tuemail@dominio.com" class="btn-contact">CONTACTO</a>
    </nav>

    <section id="inicio">
        <div class="btn-stack">
            <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
            <a href="https://www.instagram.com/starfruitseduction/" class="btn">Instagram</a>
            <a href="https://x.com/" class="btn">X</a>
        </div>
    </section>

</body>
</html>
