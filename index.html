<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction | OFM Management.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0b0a07;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(139, 0, 0, 0.04) 0%, transparent 40%);
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* BARRA SUPERIOR (HEADER) */
        header {
            width: 100%;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .nav-logo {
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4af37;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }
        .nav-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8c7853;
            border: 1px solid #2d281e;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(11, 10, 7, 0.6);
        }

        /* CONTENEDOR PRINCIPAL */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 150px 20px 60px 20px;
        }
        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        /* SECCIÓN HERO (TÍTULO) */
        h1 {
            font-size: 2.6rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 8px;
            color: #d4af37;
            background: linear-gradient(135deg, #ffeaa7 0%, #d4af37 50%, #aa7c11 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0 2px 10px rgba(212, 175, 55, 0.2));
        }
        .subtitle {
            font-size: 0.75rem;
            color: #890000;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 45px;
            font-weight: 700;
        }

        /* DISTRIBUCIÓN POR FILAS ASIMÉTRICAS */
        .grid-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        @media (max-width: 480px) {
            .grid-row-2 {
                grid-template-columns: 1fr;
            }
        }

        .row-single {
            margin-bottom: 35px;
        }

        /* TEXTO SEPARADOR MEDIO */
        .divider-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }
        .divider-subtext {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #5c5549;
            margin-bottom: 25px;
        }

        /* ESTILOS DE BOTONES */
        .btn-base {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            padding: 18px 30px;
            border-radius: 50px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-base:hover {
            transform: translateY(-2px);
        }

        /* 1. EXPLORE MODELS */
        .btn-filled-models {
            background: linear-gradient(45deg, #aa7c11, #d4af37, #ffeaa7);
            color: #0b0a07;
            font-weight: 800;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25);
        }
        .btn-filled-models:hover {
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
        }

        /* 2. CONTACT US */
        .btn-dark-contact {
            background: #12110e;
            border: 1px solid #3a3324;
            color: #d4af37;
        }
        .btn-dark-contact:hover {
            background: #1a1814;
            border-color: #d4af37;
        }

        /* 3. TELEGRAM */
        .btn-border-telegram {
            background: rgba(139, 0, 0, 0.05);
            border: 1px solid #4a0000;
            color: #ff9e9e;
        }
        .btn-border-telegram:hover {
            border-color: #890000;
            background: rgba(139, 0, 0, 0.15);
            box-shadow: 0 0 15px rgba(137, 0, 0, 0.3);
        }

        /* 4. INSTAGRAM */
        .btn-neon-instagram {
            background: #0b0a07;
            border: 2px solid transparent;
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-image: linear-gradient(#0b0a07, #0b0a07), linear-gradient(45deg, #aa7c11, #ffeaa7, #890000);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        }
        .btn-neon-instagram:hover {
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.3);
        }

        footer {
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #474135;
            letter-spacing: 2px;
            border-top: 1px solid rgba(212, 175, 55, 0.03);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <!-- LOGOTIPO SUPERIOR -->
    <header>
        <div class="nav-logo">✦ Starfruit Seduction</div>
        <div class="nav-tag">Boutique Agency</div>
    </header>

    <div class="main-content">
        <div class="container">
            
            <h1>STARFRUIT SEDUCTION</h1> 
            <div class="subtitle">WE TURN BEAUTY INTO ATTENTION. ATTENTION INTO SUBSCRIPTIONS.</div>
            
            <!-- FILA 1: BOTONES EN PAREJA -->
            <div class="grid-row-2">
                <a href="TU_LINK_DE_MODELOS" class="btn-base btn-filled-models">EXPLORE MODELS →</a>
                <a href="mailto:starfruitseduction@starfruitseduction.com" class="btn-base btn-dark-contact">CONTACT US →</a>
            </div>
            
            <!-- FILA 2: TELEGRAM -->
            <div class="row-single">
                <a href="https://t.me/starfruitseduction" class="btn-base btn-border-telegram">🚀 NEW RELEASES • TELEGRAM →</a>
            </div>
            
            <!-- FILA 3: TEXTO SEPARADOR -->
            <div class="divider-text">STAY CONNECTED</div>
            <div class="divider-subtext">Behind the scenes, updates & more.</div>
            
            <!-- FILA 4: INSTAGRAM -->
            <div class="row-single">
                <a href="https://www.instagram.com/starfruitseduction/" class="btn-base btn-neon-instagram">📸 JOIN ON INSTAGRAM →</a>
            </div>

        </div>
    </div>

    <footer>
        © 2026 STARFRUIT SEDUCTION. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
