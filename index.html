<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #cca464; --wine-red: #8c1414; --gray-text: #9e9e9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: radial-gradient(circle at center, #1a0a1a 0%, #000 100%); color: white; font-family: 'Cinzel', serif; overflow-x: hidden; }

        /* --- BARRA DE NAVEGACIÓN CORREGIDA --- */
        nav { 
            width: 100%; padding: 15px 5%; display: flex; align-items: center; justify-content: space-between;
            background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000;
        }

        /* Logo original pequeño */
        .logo-box { display: flex; flex-direction: column; align-items: center; }
        .logo-main { font-size: 1.2rem; color: var(--gold); letter-spacing: 4px; line-height: 1; }
        .logo-sub { font-size: 0.4rem; color: var(--wine-red); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

        /* Enlaces centrados */
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; }
        .nav-links a:hover { color: var(--gold); }

        /* Botón contacto */
        .btn-contact { border: 1px solid var(--gold); padding: 5px 15px; border-radius: 50px; color: var(--gold); text-decoration: none; font-size: 9px; text-transform: uppercase; transition: 0.3s; }
        .btn-contact:hover { background: var(--gold); color: black; }

        /* --- SECCIONES --- */
        section { min-height: 80vh; padding-top: 100px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: var(--gold); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 3px; }

        /* Botones grandes sociales */
        .btn { padding: 15px 30px; background: transparent; color: white; border: 1px solid var(--gold); border-radius: 50px; text-transform: uppercase; font-weight: bold; cursor: pointer; transition: 0.4s; text-decoration: none; display: block; text-align: center; width: 250px; margin-bottom: 20px; }
        .btn:hover { background: var(--gold); color: black; }
        
        /* Galería modelos */
        .model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 90%; max-width: 900px; }
        .card { border: 1px solid var(--gold); padding: 10px; border-radius: 10px; text-align: center; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">
            <h1 class="logo-main">STARFRUIT</h1>
            <h2 class="logo-sub">SEDUCTION AGENCY</h2>
        </div>
        
        <div class="nav-links">
            <a href="#inicio">INICIO</a>
            <a href="#modelos">MODELOS</a>
            <a href="#servicios">SERVICIOS</a>
        </div>

        <a href="mailto:tuemail@dominio.com" class="btn-contact">CONTACTO</a>
    </nav>

    <section id="inicio">
        <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
        <a href="https://www.instagram.com/starfruitseduction/" class="btn">Instagram</a>
        <a href="https://x.com/" class="btn">X</a>
    </section>

    <section id="modelos">
        <h2>MODELOS</h2>
        <div class="model-grid">
            <div class="card"><img src="foto1.jpg" alt="1"><h3>Nombre</h3></div>
            <div class="card"><img src="foto2.jpg" alt="2"><h3>Nombre</h3></div>
            <div class="card"><img src="foto3.jpg" alt="3"><h3>Nombre</h3></div>
        </div>
    </section>

    <section id="servicios">
        <h2>SERVICIOS</h2>
        <p>Aquí puedes poner la descripción de lo que hace la agencia.</p>
    </section>

</body>
</html>
