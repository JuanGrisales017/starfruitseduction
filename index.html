<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nombre de tu Agencia | OFM Management</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #07070a;
            /* Usamos una imagen de fondo difuminada estilo cyberpunk */
            background-image: linear-gradient(180deg, rgba(7,7,10,0.8) 0%, rgba(7,7,10,0.9) 100%), 
                              url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #ffffff;
            /* Efecto de brillo rosa neón como Blowketing */
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
            font-weight: 900;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #00ffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 0 0 8px rgba(0,255,255,0.5);
        }
        .btn-premium {
            display: inline-block;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            /* Degradado estilo Instagram/Cyberpunk */
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            padding: 16px 40px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(220, 39, 67, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            letter-spacing: 1px;
            width: 100%;
            max-width: 320px;
        }
        .btn-premium:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(220, 39, 67, 0.8);
        }
        .footer-text {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Cambia TUAGENCIA por el nombre real de tu marca -->
        <h1>TUAGENCIA</h1> 
        <div class="subtitle">We turn attention into subscriptions</div>
        
        <!-- Aquí pegas el enlace de tu Google Forms o WhatsApp -->
        <a href="AQUÍ_VA_TU_ENLACE_DE_FORMULARIO" class="btn-premium">APLICAR AHORA →</a>
        
        <div class="footer-text">© 2026 TUAGENCIA. ALL RIGHTS RESERVED.</div>
    </div>

</body>
</html>
