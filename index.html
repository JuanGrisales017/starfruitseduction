<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            color: #fff;
            min-height: 100vh;
            padding: 20px; /* Padding reducido para acercar a la esquina */
            font-family: 'Cinzel', serif;
        }

        /* Botón contacto arriba derecha */
        .top-contact {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-contact-top {
            border: 1px solid #cca464; padding: 8px 20px; border-radius: 50px; 
            color: #cca464; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-contact-top:hover { background: #cca464; color: black; }

        /* Contenedor alineado a la izquierda */
        .logo-text-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Alinea todo a la izquierda */
            width: 100%;
            max-width: 300px;
            text-align: left;
        }

        .title-starfruit { font-size: 1.8rem; font-weight: 500; color: #cca464; letter-spacing: 4px; line-height: 1; margin-bottom: 6px; }
        
        .row-with-lines { display: flex; align-items: center; justify-content: flex-start; width: 100%; margin: 2px 0; }
        .line-right { width: 25px; height: 1px; margin-left: 10px; background: linear-gradient(to right, rgba(204,164,100,0.5), rgba(204,164,100,0)); }

        .text-seduction { font-size: 0.7rem; font-weight: 600; color: #8a1212; letter-spacing: 3px; }
        .text-agency { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 400; color: #b3b3b3; letter-spacing: 5px; }

        /* Centrar botones abajo */
        .interaction-container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn { 
            width: 100%;
            border: 1px solid #cca464; padding: 12px 0; border-radius: 50px; 
            color: #cca464; text-decoration: none; font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase; text-align: center;
            transition: 0.4s;
        }
        
        .btn:hover { background: #cca464; color: black; box-shadow: 0 0 15px #cca464; }

        @media (min-width: 768px) {
            .logo-text-container { max-width: 400px; }
        }
    </style>
</head>
<body>

    <div class="top-contact">
        <a href="mailto:contacto@starfruitseduction.com" class="btn-contact-top">Contacto</a>
    </div>

    <div class="logo-text-container">
        <h1 class="title-starfruit">STARFRUIT</h1>
        <div class="row-with-lines">
            <span class="text-seduction">SEDUCTION</span>
            <span class="line-right"></span>
        </div>
        <div class="row-with-lines">
            <span class="text-agency">AGENCY</span>
            <span class="line-right"></span>
        </div>
    </div>

    <div class="interaction-container">
        <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
        <a href="https://www.instagram.com/starfruitseduction/" class="btn">Instagram</a>
        <a href="https://x.com/" class="btn">X</a>
    </div>

</body>
</html>
