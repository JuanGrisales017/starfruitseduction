<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #cca464; --wine-red: #8c1414; --gray-text: #9e9e9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: #000; color: white; font-family: 'Cinzel', serif; overflow-x: hidden; }

        /* --- NAV INVISIBLE --- */
        nav { 
            width: 100%; padding: 20px 5%; display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-container { display: flex; flex-direction: column; align-items: center; gap: 0px; line-height: 1; width: 180px; }
        .title-main { font-size: 1.5rem; color: var(--gold); letter-spacing: 6px; }
        .subtitle-row { display: flex; align-items: center; justify-content: center; width: 100%; margin: 2px 0; }
        .line { width: 30px; height: 1px; background: var(--gold); margin: 0 5px; }
        .title-sub { font-size: 0.6rem; color: var(--wine-red); letter-spacing: 4px; text-transform: uppercase; }
        .title-badge { font-family: 'Montserrat', sans-serif; font-size: 0.45rem; color: var(--gray-text); letter-spacing: 7px; text-transform: uppercase; margin-top: -2px; }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; }
        .btn-contact {
            border: 1px solid var(--gold); padding: 8px 18px; border-radius: 50px;
            color: var(--gold); text-decoration: none; font-size: 9px; text-transform: uppercase;
            transition: 0.4s;
        }
        .btn-contact:hover { background: var(--gold); color: black; }

        /* --- SECCIÓN INICIO ESTILO MÁRMOL --- */
        #inicio {
            min-height: 100vh;
            width: 100%;
            background: url('59398.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            text-align: left;
        }

        .hero-content { max-width: 500px; }
        .hero-label { color: var(--gold); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; display: block; font-family: 'Montserrat', sans-serif; }
        .hero-title { font-size: 3.5rem; color: #fff; line-height: 1.1; margin-bottom: 20px; }
        .hero-desc { color: var(--gray-text); font-family: 'Montserrat', sans-serif; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-hero {
            display: block; width: 220px; padding: 12px; border: 1px solid var(--gold);
            color: white; text-decoration: none; text-align: center; margin-bottom: 15px;
            border-radius: 5px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
            transition: 0.4s; font-family: 'Montserrat', sans-serif;
        }
        .btn-hero:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <nav>
        <div class="brand-container">
            <h1 class="title-main">STARFRUIT</h1>
            <div class="subtitle-row">
                <span class="line"></span>
                <h2 class="title-sub">SEDUCTION</h2>
                <span class="line"></span>
            </div>
            <h3 class="title-badge">AGENCY</h3>
        </div>
        
        <div class="nav-links">
            <a href="#inicio">INICIO</a>
            <a href="#servicios">SERVICIOS</a>
        </div>

        <a href="mailto:tuemail@spaceemail.com" class="btn-contact">CONTACTO</a>
    </nav>

    <section id="inicio">
        <div class="hero-content">
            <span class="hero-label">— AGENCIA DE MODELOS</span>
            <h1 class="hero-title">BELLEZA QUE INSPIRA</h1>
            <p class="hero-desc">
                Conectamos el talento con las mejores oportunidades. 
                Descubre un mundo de elegancia, exclusividad y profesionalismo.
            </p>
            <a href="https://t.me/starfruitseduction" class="btn-hero">TELEGRAM</a>
            <a href="https://www.instagram.com/starfruitseduction/" class="btn-hero">INSTAGRAM</a>
        </div>
    </section>

</body>
</html>
