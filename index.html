<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    <style>
        :root {
            --bg-color: #050505;
            --gold: #d4af37;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--white); font-family: sans-serif; }

        /* Navegación inspirada en image.png */
        nav { 
            display: flex; 
            align-items: center; 
            padding: 20px 5%; 
            background: #000; 
            border-bottom: 1px solid #222;
        }
        
        .logo-area { display: flex; align-items: center; margin-right: auto; }
        .logo-text { 
            font-size: 24px; 
            letter-spacing: 4px; 
            color: var(--gold); 
            text-transform: uppercase; 
            font-weight: bold; 
        }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { 
            color: #ccc; 
            text-decoration: none; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .nav-links a:hover { color: var(--gold); }

        /* Botón Contáctanos especial */
        .btn-contact { 
            border: 1px solid var(--gold); 
            padding: 8px 20px; 
            border-radius: 4px; 
            color: var(--gold) !important; 
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area">
            <div class="logo-text">STARFRUIT SEDUCTION</div>
        </div>

        <div class="nav-links">
            <a href="#inicio">Inicio</a>
            <a href="#modelos">Nuestras Modelos</a>
            <a href="#servicios">Servicios</a>
            <a href="#contacto">Contacto</a>
            <a href="mailto:starfruitseduction@starfruitseduction.com" class="btn-contact">CONTÁCTANOS 💬</a>
        </div>
    </nav>

    <!-- Resto del contenido manteniendo la estética anterior -->
</body>
</html>
