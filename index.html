<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f3ff;
            --neon-gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            background: radial-gradient(circle at center, #1a0a1a 0%, #050505 100%);
            color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden;
        }

        /* Navbar actualizada con estilo de 59287_2.jpg */
        nav { 
            width: 100%; padding: 20px 5%; display: flex; align-items: center; 
            background: #000; border-bottom: 1px solid var(--neon-pink);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-text-container { display: flex; flex-direction: column; align-items: center; margin-right: auto; margin-left: 20px; }
        .main-title { font-family: 'Times New Roman', serif; font-size: 32px; letter-spacing: 8px; color: var(--neon-gold); font-weight: 400; text-transform: uppercase; line-height: 1; }
        .subtitle-group { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .linea { height: 1px; width: 30px; background-color: var(--neon-gold); }
        .seduction-text { font-family: 'Arial', sans-serif; font-size: 14px; letter-spacing: 6px; color: #a00; font-weight: bold; text-transform: uppercase; }
        .agency-text { font-family: 'Arial', sans-serif; font-size: 9px; letter-spacing: 3px; color: var(--neon-gold); text-transform: uppercase; margin-top: 2px; }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        
        .btn-contact { border: 1px solid var(--neon-gold); padding: 8px 20px; border-radius: 50px; color: var(--neon-gold) !important; transition: 0.3s; }
        .btn-contact:hover { background: var(--neon-gold); color: black !important; box-shadow: 0 0 15px var(--neon-gold); }

        .btn {
            padding: 18px 40px; background: transparent; color: white; border: 2px solid var(--neon-pink);
            border-radius: 50px; text-transform: uppercase; font-weight: bold; cursor: pointer;
            transition: 0.4s; text-decoration: none; display: block; text-align: center;
        }
        .btn:hover { background: var(--neon-pink); box-shadow: 0 0 25px var(--neon-pink); transform: scale(1.05); }
        .btn-stack { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 350px; }
        
        section { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; text-align: center; }
        h1 { font-size: 70px; text-transform: uppercase; background: linear-gradient(to right, var(--neon-pink), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text-container">
            <div class="main-title">STARFRUIT</div>
            <div class="subtitle-group">
                <div class="linea"></div>
                <span class="seduction-text">SEDUCTION</span>
                <div class="linea"></div>
            </div>
            <div class="agency-text">AGENCY</div>
        </div>
        <div class="nav-links">
            <a href="#inicio">INICIO</a>
            <a href="#modelos">NUESTRAS MODELOS</a>
            <a href="#servicios">SERVICIOS</a>
            <a href="mailto:starfruitseduction@starfruitseduction.com" class="btn-contact">CONTÁCTANOS 💬</a>
        </div>
    </nav>

    <section id="inicio">
        <h1>Starfruit Seduction</h1>
        <div class="btn-stack">
            <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
            <a href="https://www.instagram.com/starfruitseduction/?__pwa=1" class="btn">Instagram</a>
            <a href="https://x.com/" class="btn">X</a>
        </div>
    </section>

</body>
</html>
