        .menu-buttons {

        .btn-neon {

        .btn-models:hover {

            background-image: linear-gradient(#07070a, #07070a), linear-gradient(45deg, #f09433, #dc2743, #bc1888);

        }
        .btn-instagram:hover {
            box-shadow: 0 6px 25px rgba(220, 39, 67, 0.6);
            transform: scale(1.03);
        }

        .footer-text {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;

</head>
