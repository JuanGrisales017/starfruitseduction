<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center; /* Centrado horizontal */
            align-items: center;     /* Centrado vertical */
            font-family: 'Cinzel', serif;
        }

        /* Contenedor centralizado */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center; /* Alinea los elementos internos al centro */
            text-align: center;
        }

        .title-starfruit { 
            font-size: 2.5rem; 
            font-weight: 500; 
            color: #cca464; 
            letter-spacing: 6px; 
            margin-bottom: 10px; 
        }
        
        .row-with-lines { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            margin: 2px 0; 
        }

        .line {
            width: 30px; 
            height: 1px; 
            background: rgba(204,164,100,0.5);
            margin: 0 10px;
        }

        .text-seduction { 
            font-size: 0.8rem; 
            font-weight: 600; 
            color: #8a1212; 
            letter-spacing: 5px; 
        }
        
        .text-agency { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.6rem; 
            font-weight: 400; 
            color: #b3b3b3; 
            letter-spacing: 7px; 
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <h1 class="title-starfruit">STARFRUIT</h1>
        
        <div class="row-with-lines">
            <span class="text-seduction">SEDUCTION</span>
        </div>
        
        <div class="row-with-lines">
            <span class="text-agency">AGENCY</span>
        </div>
    </div>

</body>
</html>
