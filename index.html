<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --gold: #d4af37;
            --wine-red: #722f37;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            background: linear-gradient(135deg, #000000, #1a0505);
            color: var(--white); 
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        /* Navbar estilo image.png */
        nav { 
            width: 100%; 
            padding: 20px 5%; 
            display: flex; 
            align-items: center; 
            background: rgba(0,0,0,0.9); 
            border-bottom: 1px solid #222;
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .logo-text { font-size: 24px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; font-weight: bold; margin-right: auto; }
        
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        
        /* Botón Contáctanos estilo contorneado */
        .btn-contact { border: 1px solid var(--gold); padding: 8px 20px; border-radius: 4px; color: var(--gold) !important; transition: 0.3s; }
        .btn-contact:hover { background: var(--gold); color: black !important; }

        /* Botones principales con borde animado */
        .btn {
            position: relative;
            padding: 18px 40px;
            background: transparent;
            color: var(--white);
            border: 2px solid var(--gold);
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            text-decoration: none;
            display: block;
            text-align: center;
            overflow: hidden;
        }
        .btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4), transparent);
            transition: 0.5s;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover { background: var(--wine-red); border-color: var(--wine-red); box-shadow: 0 0 20px var(--wine-red); }

        section { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; text-align: center; }
        h1 { font-size: 70px; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
        .btn-stack { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 350px; margin-top: 40px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">STARFRUIT SEDUCTION</div>
        <div class="nav-links">
            <a href="#inicio">Inicio</a>
            <a href="#modelos">Nuestras Modelos</a>
            <a href="#servicios">Servicios</a>
            <a href="#contacto">Contacto</a>
            <a href="mailto:starfruitseduction@starfruitseduction.com" class="btn-contact">CONTÁCTANOS 💬</a>
        </div>
    </nav>

    <section id="inicio">
        <h1>Starfruit Seduction</h1>
        <div class="btn-stack">
            <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
            <a href="https://www.instagram.com/starfruitseduction/?__pwa=1" class="btn">Instagram</a>
            <a href="https://x.com/" class="btn">X</a>
        </div>
    </section>

    <div style="text-align: center; padding: 20px; color: var(--gold);">PREMIUM CREATOR • EST. 2026</div>

</body>
</html>
