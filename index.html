<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #cca464; --wine-red: #8c1414; --gray-text: #9e9e9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: #000; color: white; font-family: 'Cinzel', serif; overflow-x: hidden; }

        /* --- ANIMACIONES DE ENTRADA (CARGA) --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-content > * {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
        }

        .hero-label { animation-delay: 0.2s; }
        .hero-title { animation-delay: 0.4s; }
        .hero-desc { animation-delay: 0.6s; }
        .animate-btn:nth-child(4) { animation-delay: 0.8s; }
        .animate-btn:nth-child(5) { animation-delay: 1.0s; }
        .animate-btn:nth-child(6) { animation-delay: 1.2s; }

        /* --- ANIMACIÓN DE REBOTE (HOVER) --- */
        @keyframes rubberBand {
            0% { transform: scale(1); }
            30% { transform: scaleX(1.15) scaleY(0.85); }
            40% { transform: scaleX(0.85) scaleY(1.15); }
            50% { transform: scaleX(1.05) scaleY(0.95); }
            65% { transform: scaleX(0.95) scaleY(1.05); }
            100% { transform: scale(1); }
        }

        /* --- NAV TRANSPARENTE TOTAL --- */
        nav { 
            width: 100%; padding: 20px 5%; display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; z-index: 1000;
            background: transparent !important;
            backdrop-filter: none !important;
            border-bottom: none !important;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .brand-container { display: flex; flex-direction: column; align-items: center; gap: 0px; line-height: 1; width: 180px; }
        .title-main { font-size: 1.5rem; color: var(--gold); letter-spacing: 6px; }
