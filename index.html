<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            color: #fff;
            min-height: 100vh;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Barra superior centrada */
        .top-nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .top-nav a { color: #fff; text-decoration: none; transition: 0.3s; }
        .top-nav a:hover { color: #cca464; }

        /* Contenedor central */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 320px;
            padding-bottom: 50px;
        }

        .logo-main-center { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .title-starfruit { font-size: 2.5rem; font-weight: 500; color: #cca464; letter-spacing: 6px; margin-bottom: 10px; }
        
        .row-with-lines { display: flex; align-items: center; justify-content: center; width: 100%; margin: 3px 0; }
        .text-seduction { font-size: 0.8rem; font-weight: 600; color: #8a1212; letter-spacing: 5px; }
        .text-agency { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; font-weight: 400; color: #b3b3b3; letter-spacing: 7px; }

        /* Botones */
        .interaction-wrapper { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            width: 100%;
            border: 1px solid #cca464; padding: 12px 0; border-radius: 50px; 
            color: #cca464; text-decoration: none; font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase; text-align: center;
            transition: 0.4s;
        }
        .btn:hover { background: #cca464; color: black; box-shadow: 0 0 15px #cca464; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#inicio">Inicio</a>
        <a href="#modelos">Modelos</a>
        <a href="#servicios">Servicios</a>
    </nav>

    <div class="main-wrapper">
        <div class="logo-main-center">
            <h1 class="title-starfruit">STARFRUIT</h1>
            <div class="row-with-lines"><span class="text-seduction">SEDUCTION</span></div>
            <div class="row-with-lines"><span class="text-agency">AGENCY</span></div>
        </div>

        <div class="interaction-wrapper">
            <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
            <a href="https://www.instagram.com/starfruitseduction/" class="btn">Instagram</a>
            <a href="https://x.com/" class="btn">X</a>
        </div>
    </div>

</body>
</html>
