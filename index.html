<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-pink: #ff00ff;
            --neon-blue: #00f3ff;
            --neon-gold: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at center, #1a0a1a 0%, #050505 100%);
            color: white; 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animación de entrada */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 1s ease-out; }

        nav { width: 100%; padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 4px; color: white; text-transform: uppercase; }
        .menu a { color: white; margin-left: 20px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .menu a:hover { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        .hero { margin-top: 100px; text-align: center; }
        h1 { font-size: 80px; text-transform: uppercase; background: linear-gradient(to right, var(--neon-pink), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Botones Animados */
        .btn-grid { margin-top: 50px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn { padding: 20px 40px; border: none; border-radius: 50px; color: black; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.4s; transform: scale(1); box-shadow: 0 0 15px rgba(255,255,255,0.2); text-decoration: none; display: block; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(255,255,255,0.5); }
        
        .btn-insta { background: var(--neon-pink); }
        .btn-tele { background: var(--neon-blue); }
        .btn-mail { background: white; }
        .btn-twit { background: var(--neon-gold); }
    </style>
</head>
<body>

    <nav class="animate">
        <div class="logo">STARFRUIT</div>
        <div class="menu">
            <a href="https://www.instagram.com/starfruitseduction/?__pwa=1">Instagram</a>
            <a href="https://t.me/starfruitseduction">Telegram</a>
            <a href="mailto:starfruitseduction@starfruitseduction.com">Contacto</a>
        </div>
    </nav>

    <main class="hero animate">
        <h1>STARFRUIT SEDUCTION</h1>
        <p style="font-size: 20px; color: #888; margin-bottom: 30px;">PREMIUM CREATOR • EST. 2026</p>
        
        <div class="btn-grid">
            <a href="https://t.me/starfruitseduction" target="_blank" class="btn btn-tele">Telegram</a>
            <a href="https://x.com/" target="_blank" class="btn btn-twit">Twitter (X)</a>
            <a href="mailto:starfruitseduction@starfruitseduction.com" class="btn btn-mail">Email Contact</a>
            <a href="https://www.instagram.com/starfruitseduction/?__pwa=1" target="_blank" class="btn btn-insta">Instagram</a>
        </div>
    </main>

</body>
</html>
