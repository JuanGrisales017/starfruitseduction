<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #cca464; --wine-red: #8c1414; --gray-text: #9e9e9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: radial-gradient(circle at center, #1a0a1a 0%, #000 100%); color: white; font-family: 'Cinzel', serif; overflow-x: hidden; }

        /* --- NAV COMPACTO --- */
        nav { 
            width: 100%; padding: 10px 5%; display: flex; align-items: center; justify-content: space-between;
            background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000;
        }

        /* Logo compacto */
        .brand-container { display: flex; flex-direction: column; }
        .title-main { font-size: 1.1rem; color: var(--gold); letter-spacing: 4px; line-height: 1; }
        .title-sub { font-size: 0.5rem; color: var(--wine-red); letter-spacing: 3px; text-transform: uppercase; }

        .nav-center { display: flex; gap: 20px; }
        .nav-center a { color: #fff; text-decoration: none; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; }
        .nav-center a:hover { color: var(--gold); }
        
        .btn-contact {
            border: 1px solid var(--gold); padding: 5px 12px; border-radius: 50px;
            color: var(--gold); text-decoration: none; font-size: 9px; text-transform: uppercase;
            transition: 0.4s;
        }
        .btn-contact:hover { background: var(--gold); color: black; }

        /* --- SECCIONES Y BOTONES ORIGINALES --- */
        section { min-height: 80vh; padding: 80px 5%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h2 { color: var(--gold); margin-bottom: 40px; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 3px; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .btn {
            padding: 15px 30px; background: transparent; color: white; border: 1px solid var(--gold);
            border-radius: 50px; text-transform: uppercase; font-weight: bold; cursor: pointer;
            transition: 0.4s; text-decoration: none; display: block; text-align: center; width: 250px;
        }
        .btn:hover { background: var(--gold); color: black; animation: bounce 0.6s ease infinite; }
        .btn-stack { display: flex; flex-direction: column; gap: 20px; align-items: center; }

        /* Modelos y Servicios */
        .model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 800px; }
        .model-card { border: 1px solid var(--gold); padding: 8px; border-radius: 10px; text-align: center; }
        .model-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
        .services-content { max-width: 500px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="brand-container">
            <h1 class="title-main">STARFRUIT</h1>
            <h2 class="title-sub">SEDUCTION AGENCY</h2>
        </div>
        
        <div class="nav-center">
            <a href="#inicio">INICIO</a>
            <a href="#modelos">MODELOS</a>
            <a href="#servicios">SERVICIOS</a>
        </div>

        <a href="mailto:spaceemail@example.com" class="btn-contact">CONTACTO</a>
    </nav>

    <section id="inicio">
        <div class="btn-stack">
            <a href="https://t.me/starfruitseduction" class="btn">Telegram</a>
            <a href="https://www.instagram.com/starfruitseduction/" class="btn">Instagram</a>
            <a href="https://x.com/" class="btn">X</a>
        </div>
    </section>

    <section id="modelos">
        <h2>NUESTRAS MODELOS</h2>
        <div class="model-grid">
            <div class="model-card"><img src="foto1.jpg" alt="Modelo"><h3>NOMBRE</h3></div>
            <div class="model-card"><img src="foto2.jpg" alt="Modelo"><h3>NOMBRE</h3></div>
            <div class="model-card"><img src="foto3.jpg" alt="Modelo"><h3>NOMBRE</h3></div>
        </div>
    </section>

    <section id="servicios">
        <h2>SERVICIOS</h2>
        <div class="services-content">
            <div class="service-item">
                <h3>Gestión de Agencia</h3>
                <p>Optimizamos tu presencia profesional.</p>
            </div>
            <div class="service-item">
                <h3>Marketing</h3>
                <p>Estrategias para tu marca personal.</p>
            </div>
        </div>
    </section>

</body>
</html>
