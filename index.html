<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction | OFM Management</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #030305;
            background-image: 
                radial-gradient(circle at 90% 10%, rgba(255, 0, 127, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 10% 90%, rgba(0, 255, 255, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* BARRA SUPERIOR (HEADER) */
        header {
            width: 100%;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .nav-logo {
            font-weight: 900;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }
        .nav-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555866;
            border: 1px solid #222530;
            padding: 6px 12px;
            border-radius: 20px;
        }

        /* CONTENEDOR PRINCIPAL */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 140px 20px 60px 20px;
        }
        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        /* SECCIÓN HERO (TÍTULO) */
        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            font-weight: 900;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #8e92a6;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: bold;
        }

        /* DISTRIBUCIÓN POR FILAS ASIMÉTRICAS */
        .grid-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        @media (max-width: 480px) {
            .grid-row-2 {
                grid-template-columns: 1fr;
            }
        }

        .row-single {
            margin-bottom: 30px;
        }

        /* TEXTO SEPARADOR MEDIO */
        .divider-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff007f;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .divider-subtext {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666a7a;
            margin-bottom: 20px;
        }

        /* ESTILOS DE BOTONES */
        .btn-base {
            display: inline-block;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            padding: 16px 30px;
            border-radius: 50px;
            letter-spacing: 1.5px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-base:hover {
            transform: scale(1.02);
        }

        .btn-filled-models {
            background: linear-gradient(90deg, #ff007f, #b34eff);
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.4);
        }
        .btn-filled-models:hover {
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.7);
        }

        .btn-dark-contact {
            background: #111216;
            border: 1px solid #222530;
        }
        .btn-dark-contact:hover {
            background: #16181d;
            border-color: #44495e;
        }

        .btn-border-telegram {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #333644;
        }
        .btn-border-telegram:hover {
            border-color: #0088cc;
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.3);
        }

        .btn-neon-instagram {
            background: #030305;
            border: 2.5px solid transparent;
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-image: linear-gradient(#030305, #030305), linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.15);
        }
        .btn-neon-instagram:hover {
            box-shadow: 0 6px 25px rgba(220, 39, 67, 0.5);
        }

        footer {
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #414452;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            margin-top: auto;
        }
    </style>
</head>
<body>

            <div class="grid-row-2">
                <a href="TU_LINK_DE_MODELOS" class="btn-base btn-filled-models">EXPLORE MODELS →</a>
                <a href="mailto:starfruitseduction@starfruitseduction.com" class="btn-base btn-dark-contact">CONTACT US →</a>
            </div>
            
            <!-- FILA 2: TELEGRAM CENTRADO -->
            <div class="row-single">
                <a href="https://t.me/starfruitseduction" class="btn-base btn-border-telegram">🚀 NEW RELEASES • TELEGRAM →</a>
            </div>
            
            <!-- FILA 3: TEXTO SEPARADOR -->
            <div class="divider-text">STAY CONNECTED</div>
            <div class="divider-subtext">Behind the scenes, updates & more.</div>
            
            <!-- FILA 4: INSTAGRAM EN GRANDE -->
            <div class="row-single">
                <a href="https://www.instagram.com/starfruitseduction/" class="btn-base btn-neon-instagram">📸 JOIN ON INSTAGRAM →</a>
            </div>

        </div>
    </div>

    <footer>
        © 2026 STARFRUIT SEDUCTION. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
