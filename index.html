<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit Seduction Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #cca464; --wine-red: #8c1414; --gray-text: #9e9e9e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Cinzel', serif; }

        /* Barra de navegación */
        nav { 
            width: 100%; padding: 20px; display: flex; justify-content: center; gap: 20px;
            border-bottom: 1px solid #222; font-size: 0.7rem; letter-spacing: 2px;
        }
        nav a { color: #fff; text-decoration: none; text-transform: uppercase; }
        nav a:hover { color: var(--gold); }

        /* Logo */
        .brand-container { text-align: center; margin: 40px 0; }
        .title-main { font-size: 2rem; color: var(--gold); letter-spacing: 6px; }
        .title-sub { font-size: 0.7rem; color: var(--wine-red); letter-spacing: 4px; }
        .title-badge { font-family: sans-serif; font-size: 0.5rem; color: var(--gray-text); letter-spacing: 5px; margin-top: 5px; }

        /* Botones redondeados */
        .btn-stack { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 280px; margin: 0 auto; }
        .btn {
            padding: 12px 30px; border: 1px solid var(--gold);
            border-radius: 50px; /* Redondeado aplicado */
            color: var(--gold); text-transform: uppercase; font-size: 0.8rem;
            text-decoration: none; text-align: center; transition: 0.4s;
        }
        .btn:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Modelos</a>
        <a href="#">Servicios</a>
    </nav>

    <div class="brand-container">
        <h1 class="title-main">STARFRUIT</h1>
        <h2 class="title-sub">SEDUCTION</h2>
        <h3 class="title-badge">AGENCY</h3>
    </div>

    <div class="btn-stack">
        <a href="#" class="btn">Telegram</a>
        <a href="#" class="btn">Instagram</a>
        <a href="#" class="btn">X</a>
    </div>

</body>
</html>
